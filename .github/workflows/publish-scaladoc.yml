name: CI & Publish Docs

on:
  push:
    branches: [ master ]      # adjust if your default branch is 'master'
  workflow_dispatch:        # manual trigger from the Actions tab
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: sbt              # speeds up successive runs

      - name: Setup sbt launcher
        uses: sbt/setup-sbt@v1

      - name: Build and Test
        run: sbt +test


      - name: Generate Scaladoc (Scala 3)
        run: sbt "++ 3.3.6 root/doc"

      - name: Collect generated site
        shell: bash
        run: |
          DOC_DIR=$(echo target/scala-3.*/api)   # Scala 3 doc folder
          mkdir -p site
          cp -R "$DOC_DIR"/. site
          echo "Documentation copied from $DOC_DIR to ./site"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # provided automatically
          publish_dir: ./site
          force_orphan: true                         # keep history small
